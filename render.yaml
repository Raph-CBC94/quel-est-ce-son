services:
  - type: web
    name: chat-ou-bebe
    env: node
    buildCommand: mkdir -p .pnpm-bin && curl -fsSL https://github.com/pnpm/pnpm/releases/download/v9.15.9/pnpm-linux-x64 -o .pnpm-bin/pnpm && chmod +x .pnpm-bin/pnpm && .pnpm-bin/pnpm install --frozen-lockfile && .pnpm-bin/pnpm --filter @workspace/chat-ou-bebe run build
    startCommand: npx serve@14 artifacts/chat-ou-bebe/dist/public --listen $PORT --single
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
